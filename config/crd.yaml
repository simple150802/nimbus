apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nimbuses.lazyken.io
spec:
  group: lazyken.io
  scope: Namespaced
  names:
    plural: nimbuses
    singular: nimbus
    kind: Nimbus
    shortNames:
      - nb
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Nodes
          type: string
          description: Number of candidate nodes that have been profiled.
          jsonPath: .status.perNode
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: |
            Nimbus declares a Knative service whose startup- and running-phase
            CPU limits should be auto-profiled by the NIMBUS controller using
            a binary search. Finalized values are written to .status and, once
            present, cause the controller to skip re-probing on subsequent
            restarts or re-applies.
          type: object
          required: [spec, selector]
          properties:
            spec:
              description: Desired state — what to profile and when the startup phase ends.
              type: object
              required: [resourcePolicy, durationPolicy, placement]
              properties:
                placement:
                  description: |
                    Nimbus-owned scheduling scope. nodeSelector is the only
                    supported placement input for the thesis POC: every
                    controlled ksvc is treated as a member of this pool, and
                    offline resolves the selector against Ready+schedulable
                    nodes, sorts by name, and measures the first match as
                    the representative for the whole pool. At apply time the
                    same selector is written verbatim onto every ksvc in
                    spec.selector.matchExpressions[0].values, replacing any
                    user-set keys — one Nimbus means one placement pool.
                  type: object
                  required: [nodeSelector]
                  properties:
                    nodeSelector:
                      description: |
                        Label key/value pairs that must all be present on a
                        node for it to be part of the pool. At least one
                        entry is required. Operators are expected to label
                        every pool node with this key/value before applying
                        the Nimbus (e.g. nimbus.io/pool=worker-pool-a).
                      type: object
                      minProperties: 1
                      additionalProperties:
                        type: string
                metric:
                  description: |
                    RT metric the binary search gates on. The search
                    converges to the smallest CPU at which the chosen
                    metric stops improving by more than 10% between
                    adjacent probes. All three percentiles are still
                    measured and recorded in the sample list for every
                    probe; this field only selects which one drives
                    convergence (and therefore which one ends up in
                    .status.perNode[*].startingCpu / .runningCpu).
                    Defaults to p95 — the most conservative choice.
                  type: string
                  enum: [avg, p90, p95]
                  default: p95
                acceptableResponseTime:
                  description: |
                    Phase-specific latency budgets in milliseconds.
                    Consumed exclusively by the online tier waterfall;
                    the offline binary search ignores this field. For
                    each candidate node, the online stage derives c_min
                    (the "pack target" between c_floor and c_opt) as the
                    smallest probed CPU on that node where the chosen
                    spec.metric value is at or below the budget. c_min
                    is therefore per-node — a slow node may need more CPU
                    than a fast one to hit the same latency. When this
                    object is absent the online tier waterfall degenerates
                    to two tiers (c_opt -> c_floor) — no middle pack
                    target. The 'cold' subfield is required when the
                    object is set; 'warm' is optional and may be omitted
                    when only cold-phase admission needs the middle tier.
                  type: object
                  required: [cold]
                  properties:
                    cold:
                      description: |
                        RT budget in milliseconds for cold-start admission.
                        c_min_cold per node = smallest probed CPU on that
                        node where rt[spec.metric] <= this value.
                      type: integer
                      minimum: 1
                    warm:
                      description: |
                        Optional RT budget in milliseconds for warm-phase
                        c_min derivation. Absent = no warm pack target
                        (waterfall on warm phase is c_opt -> c_floor only).
                      type: integer
                      minimum: 1
                export:
                  description: |
                    Optional sample-export configuration. When set, the
                    controller writes per-probe raw TTFB samples to a
                    timestamped subdirectory under .dir, alongside a
                    meta.json snapshot of the Nimbus spec and per-node
                    result.json files with the converged CPU values. Absent
                    field = no export.
                  type: object
                  required: [dir]
                  properties:
                    dir:
                      description: |
                        Filesystem path where samples are written. Relative
                        paths resolve against the controller's working
                        directory. Absolute paths are used as-is. Local-dev
                        scope: '..' segments are allowed so operators can
                        place results outside the controller's cwd.
                      type: string
                      minLength: 1
                      pattern: '^[A-Za-z0-9_./-]+$'
                preMeasured:
                  description: |
                    Optional preload of a previous run's results. When set
                    and loadFromDir points at an export-format directory
                    (the same layout written by spec.export), the controller
                    reads each <node>/result.json and seeds startingCpu /
                    runningCpu / startingRt / runningRt for that node.
                    Saturated nodes are skipped by the binary search; only
                    unsaturated nodes get re-measured. Status overlays
                    preMeasured — values already in .status.perNode win over
                    the loaded data.
                  type: object
                  required: [loadFromDir]
                  properties:
                    loadFromDir:
                      description: |
                        Filesystem path to a previously-exported run
                        directory (typically results/<timestamp>/). Same
                        path-resolution rules as spec.export.dir: relative
                        against cwd, absolute used as-is, '..' allowed.
                      type: string
                      minLength: 1
                      pattern: '^[A-Za-z0-9_./-]+$'
                measurement:
                  description: |
                    Controls how many samples the controller averages per
                    probe. Cold samples are expensive — each forces a
                    scale-to-zero before a fresh cold start — so keep this
                    low unless you explicitly want robustness over speed.
                    Warm samples are cheap and run against an already-up pod.
                    Omit the field to accept the defaults.
                  type: object
                  default: {}
                  properties:
                    coldSamples:
                      description: Cold-start samples per probe (default 1).
                      type: integer
                      minimum: 1
                      default: 1
                    warmSamples:
                      description: Warm samples per probe; response time is averaged (default 10).
                      type: integer
                      minimum: 1
                      default: 10
                resourcePolicy:
                  description: Per-container CPU range the binary search operates within.
                  type: object
                  required: [containerPolicies]
                  properties:
                    containerPolicies:
                      description: |
                        One entry per target container. The controller currently
                        only honors entry [0].
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required: [containerName, cpuBudget]
                        properties:
                          containerName:
                            description: Name of the container inside the pod (e.g. "user-container").
                            type: string
                          cpuBudget:
                            description: |
                              The economic ceiling — the maximum CPU per ksvc the
                              operator is willing to pay for. NIMBUS never assigns
                              more than this. The binary search anchors at this
                              value and bisects downward to discover the
                              latency-plateau edge (c_opt) and the smallest CPU
                              meeting the SLO (c_min); the operator does not
                              supply a lower bound — the algorithm's resolution
                              floor + a hardcoded safety floor handle that.
                              Standard Kubernetes CPU quantity (e.g. "2",
                              "2000m", "1.5").
                            type: string
                            pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                durationPolicy:
                  description: |
                    Signals the controller uses to declare each measurement
                    phase finished. coldApiCondition gates the offline cold
                    phase (model load) and is also written into the
                    StartupCPUBoost CR consumed by the upstream
                    kube-startup-cpu-boost webhook. warmApiCondition gates
                    the offline warm phase; it exists separately because a
                    cold-style body-substring gate against /status would
                    measure flag-read latency rather than CPU-sensitive
                    inference time. Fixed and podCondition policies
                    supported by the upstream StartupCPUBoost CRD are not
                    honored here.
                  type: object
                  required: [coldApiCondition, warmApiCondition]
                  properties:
                    coldApiCondition:
                      description: |
                        HTTP probe whose body, once matched, ends the
                        startup (cold) phase. The controller constructs
                        the actual URL per ksvc as
                        http://<ksvc>.<namespace>.svc.cluster.local<path>,
                        so a Nimbus targeting multiple ksvcs probes each
                        one at its own URL (the upstream
                        kube-startup-cpu-boost controller polls these to
                        decide when each boost ends). Only http scheme +
                        the standard .svc.cluster.local DNS suffix are
                        supported today; both are hardcoded in the URL
                        builder.
                      type: object
                      required: [path, response]
                      properties:
                        path:
                          description: |
                            URL path the controller GETs (e.g. "/status").
                            Must start with '/'. The host and scheme are
                            derived from the ksvc + namespace.
                          type: string
                          pattern: "^/.+"
                          minLength: 1
                        response:
                          description: Substring the controller looks for in the response body to declare readiness.
                          type: string
                    warmApiCondition:
                      description: |
                        HTTP probe used during the offline warm phase. The
                        gate is "actual HTTP code == statusCode AND (if
                        bodyContains is set, the body contains it)". Hit a
                        real workload endpoint (e.g. inference) so the
                        binary search measures CPU-sensitive steady-state
                        latency instead of a /status flag read. URL is
                        constructed per ksvc just like coldApiCondition.
                      type: object
                      required: [path, statusCode]
                      properties:
                        path:
                          description: |
                            URL path the controller GETs (e.g.
                            "/detect/local"). Must start with '/'.
                          type: string
                          pattern: "^/.+"
                          minLength: 1
                        statusCode:
                          description: |
                            Single HTTP status code that means "success".
                            Typically 200 for inference endpoints. The
                            response must match this exactly for the
                            gate to pass.
                          type: integer
                          minimum: 100
                          maximum: 599
                        bodyContains:
                          description: |
                            Optional defensive substring check. When set,
                            the response body must contain this string
                            in addition to the statusCode match. Useful
                            when the upstream sometimes returns 200 with
                            an error payload.
                          type: string
            selector:
              description: |
                Names the target Knative service(s) by label. The current
                controller treats matchExpressions[0].values as an enumerated
                list of ksvc names; only the "In" operator is supported.
              type: object
              required: [matchExpressions]
              properties:
                matchExpressions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [key, operator, values]
                    properties:
                      key:
                        description: |
                          Label key to match. For Knative services this is
                          typically "serving.knative.dev/service".
                        type: string
                      operator:
                        description: |
                          Set membership operator. NIMBUS only implements "In"
                          today; other values Kubernetes allows (NotIn,
                          Exists, DoesNotExist) will be ignored.
                        type: string
                        enum: [In]
                      values:
                        description: Knative service names to profile.
                        type: array
                        minItems: 1
                        items:
                          type: string
            status:
              description: |
                Observed state — filled in by the controller. perNode keys
                are cluster node names; each entry holds the finalized CPU
                limit the binary search converged to on that node under
                the gate metric chosen in spec.metric. The Nimbus is
                considered "completed" once every candidate node has both
                startingCpu and runningCpu populated, at which point a
                controller restart will re-apply these values without
                re-probing. To force a re-search, clear the map via the
                status subresource.

                The top-level runningCpu / startingCpu are cluster-wide
                aggregates (max over perNode) — exactly the values the
                controller applies to the ksvc spec and the StartupCPUBoost
                CR. They are recomputed whenever perNode changes.
              type: object
              properties:
                runningCpu:
                  description: |
                    Cluster-wide steady-state CPU limit applied to the ksvc.
                    Equals the max of perNode[*].runningCpu so the slowest
                    node still meets the running-phase RT budget under the
                    gate metric.
                  type: string
                  pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                startingCpu:
                  description: |
                    Cluster-wide cold-phase CPU limit applied via the
                    StartupCPUBoost CR. Equals the max of
                    perNode[*].startingCpu so the slowest node still
                    cold-starts within the configured RT budget under the
                    gate metric.
                  type: string
                  pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                perNode:
                  description: Per-node converged CPU limits + probe samples, keyed by node name.
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      startingCpu:
                        description: |
                          Finalized CPU limit for the startup phase on this
                          node, computed under the run's gate metric
                          (spec.metric, defaults to p95).
                        type: string
                      startingRt:
                        description: |
                          Saturated RT stats — the (avg, p90, p95) measured
                          at the converged startingCpu. Populated when the
                          cold phase saturates; omitted otherwise.
                        type: object
                        properties:
                          avgMillis: { type: integer, minimum: 0 }
                          p90Millis: { type: integer, minimum: 0 }
                          p95Millis: { type: integer, minimum: 0 }
                      runningCpu:
                        description: |
                          Finalized CPU limit for the running phase on this
                          node, computed under the run's gate metric.
                        type: string
                      cMinStarting:
                        description: |
                          c_min for the cold phase — the smallest probed
                          CPU on this node where the gate metric meets
                          spec.acceptableResponseTime.cold. Omitted (empty)
                          when no probed sample met the SLO or when
                          acceptableResponseTime.cold was not supplied.
                          Consumed by the online stage's waterfall.
                        type: string
                        pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                      cMinRunning:
                        description: |
                          c_min for the warm phase. Same derivation rule as
                          cMinStarting but against acceptableResponseTime.warm.
                        type: string
                        pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                      runningRt:
                        description: |
                          Saturated RT stats — the (avg, p90, p95) measured
                          at the converged runningCpu. Populated when the
                          warm phase saturates; omitted otherwise.
                        type: object
                        properties:
                          avgMillis: { type: integer, minimum: 0 }
                          p90Millis: { type: integer, minimum: 0 }
                          p95Millis: { type: integer, minimum: 0 }
                      coldRtSamples:
                        description: |
                          (cpu, rt-stats) points the binary search visited during
                          the starting phase on this node, ordered by ascending
                          cpu. rtMillis is the mean across the probe's samples;
                          rtP90Millis / rtP95Millis are nearest-rank percentiles
                          for the same probe. Consumed by the online stage.
                        type: array
                        items:
                          type: object
                          required: [cpu, rtMillis]
                          properties:
                            cpu:
                              type: string
                              pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                            rtMillis:
                              type: integer
                              minimum: 0
                            rtP90Millis:
                              type: integer
                              minimum: 0
                            rtP95Millis:
                              type: integer
                              minimum: 0
                      warmRtSamples:
                        description: |
                          (cpu, rt-stats) points the binary search visited during
                          the running phase on this node, ordered by ascending
                          cpu. Same shape as coldRtSamples.
                        type: array
                        items:
                          type: object
                          required: [cpu, rtMillis]
                          properties:
                            cpu:
                              type: string
                              pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                            rtMillis:
                              type: integer
                              minimum: 0
                            rtP90Millis:
                              type: integer
                              minimum: 0
                            rtP95Millis:
                              type: integer
                              minimum: 0
                applied:
                  description: |
                    Per-ksvc outcome of the most recent apply tick. Keyed by
                    ksvc name (matching spec.selector.matchExpressions[0].values
                    entries). Rewritten wholesale on every reconcile so a
                    successful tick clears any previous error. The presence
                    of an entry guarantees NIMBUS *attempted* to apply that
                    ksvc; absence means the ksvc wasn't in values[] at the
                    time of the tick. applyError on an entry indicates the
                    apiserver rejected one of the patches — the ksvc's
                    current spec may not match what nodeSelector/runningCpu
                    declare here. Operators can join against this map to
                    see whether the invariant "ksvc.spec.template.spec.nodeSelector
                    == spec.placement.nodeSelector" actually holds.
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      nodeSelector:
                        description: |
                          The selector NIMBUS attempted to write onto this
                          ksvc. Equals spec.placement.nodeSelector at apply
                          time; cached here for traceability when spec
                          changes after the apply.
                        type: object
                        additionalProperties:
                          type: string
                      startingCpu:
                        description: Cold-phase CPU written into the per-ksvc StartupCPUBoost CR.
                        type: string
                        pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                      runningCpu:
                        description: Running-phase CPU patched onto the ksvc spec (requests == limits).
                        type: string
                        pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                      applyError:
                        description: |
                          Non-empty when at least one of the patches in this
                          tick failed for this ksvc. The exact string is the
                          Go error.Error() of the first failure; further
                          patches in the same tick are skipped to avoid
                          a partially-mutated ksvc. Cleared on the next
                          successful reconcile.
                        type: string
                online:
                  description: |
                    Online-stage assignments — filled in by the online reconciler
                    after offline saturation. One entry per ksvc named in
                    spec.selector.matchExpressions[0].values. Drives the
                    experiment script's policy join and the controller's
                    per-ksvc CPU/node patches. Absent until the online stage
                    runs for the first time.
                  type: object
                  properties:
                    activeAssignments:
                      description: |
                        Count of entries in assignments[]. Equals
                        len(assignments). Exposed for "kubectl get -o wide"
                        and for quick health checks without parsing the array.
                      type: integer
                      minimum: 0
                    burstMode:
                      description: |
                        Cluster-wide burst-detector state that drove the most
                        recent reconcile: NORMAL (full free CPU) or BURST
                        (reserve held back, prefers c_min). The detector is
                        process-global, not per-Nimbus; recorded here for
                        experiment-CSV correlation.
                      type: string
                      enum: ["NORMAL", "BURST"]
                    assignments:
                      description: |
                        One row per managed ksvc, in the order they appear in
                        spec.selector.matchExpressions[0].values. A row is
                        produced even if the ksvc could not be admitted
                        (Pending: degraded=true, no tier/node/cpu); the only
                        reason a listed ksvc is omitted is that it does not
                        exist in the cluster (the reconciler logs and skips).
                      type: array
                      items:
                        type: object
                        # Only ksvc is guaranteed: a Pending row (no tier fit)
                        # carries degraded=true and omits node/tier/cpu.
                        required: [ksvc]
                        properties:
                          ksvc:
                            description: |
                              Knative service name this row describes. Always
                              one of spec.selector.matchExpressions[0].values.
                              Join key for the experiment CSV.
                            type: string
                          node:
                            description: |
                              Placement indicator. For Tier 1/2 (pool-wide) this
                              is the pool label value (e.g. "serverless") —
                              kube-scheduler picks the host. For Tier 3
                              (best_fit) this is the chosen hostname NIMBUS pinned
                              the ksvc to via spec.template.spec.nodeSelector
                              ["kubernetes.io/hostname"]. Empty on a Pending row.
                            type: string
                          tier:
                            description: |
                              CPU tier the waterfall chose. c_opt / c_min are
                              pool-wide (kube-scheduler picks the node).
                              best_fit is the degraded fallback: pinned to the
                              node with most free CPU, with cold = that node's
                              full free_n (warm always c_opt_warm; thesis scope
                              is cold-start optimization only). Omitted on a
                              Pending row (no node meets c_opt_warm; degraded=true).
                              See OVERVIEW §8.3.
                            type: string
                            enum: ["c_opt", "c_min", "best_fit"]
                          startingCpu:
                            description: |
                              Cold-phase CPU value written into the per-ksvc
                              StartupCPUBoost CR. Source depends on tier:
                              c_opt -> status.perNode[node].startingCpu,
                              c_min -> smallest cold sample meeting
                              acceptableResponseTime.cold under spec.metric,
                              c_floor -> spec.resourcePolicy...limits.min.
                            type: string
                            pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                          runningCpu:
                            description: |
                              Steady-state CPU value patched onto the ksvc as
                              spec.template.spec.containers[0].resources.limits.cpu.
                              Always <= startingCpu. Same per-tier derivation
                              as startingCpu but from warm samples and
                              acceptableResponseTime.warm.
                            type: string
                            pattern: "^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$"
                          degraded:
                            description: |
                              True only when the waterfall ran out of headroom
                              and admitted this ksvc at c_floor on the
                              least-loaded node (no SLO guarantee). False in
                              the normal path even when tier=c_floor, if
                              c_floor was the first tier to fit on a properly
                              chosen node. Lets experiments separate "real"
                              assignments from "we had to put it somewhere".
                            type: boolean
                          ready:
                            description: |
                              Mirror of the target ksvc's Ready condition at
                              the time of the last reconcile. ready=false
                              means the patch landed but the ksvc didn't come
                              up healthy under the assigned CPU — useful for
                              the experiment script to drop bad rows.
                            type: boolean
                          url:
                            description: |
                              Cluster-internal URL for this ksvc, built via
                              BuildKsvcStatusURL(ns, ksvc, spec...path).
                              Cached on status so the experiment script
                              doesn't need a separate kubectl get ksvc per
                              row, and to pin the URL to what online
                              actually decided.
                            type: string
