apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sha256-001
  namespace: serverless
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/window: 10s
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
    spec:
      containerConcurrency: 1
      containers:
        - image: docker.io/meowbyanh/go-sha256:v2
          ports:
            - containerPort: 8000
          env:
            - name: INIT_ITERATIONS
              value: "50000000"
            - name: ITERATIONS
              value: "5000000"
          resources:
            requests:
              cpu: "200m"
            limits:
              cpu: "200m"
