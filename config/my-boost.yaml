apiVersion: lazyken.io/v1alpha1
kind: Recon
metadata:
  name: boost-001
  namespace: serverless
selector:
  matchExpressions:
  - key: serving.knative.dev/service
    operator: In
    values: ["measure-yolo"]
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: user-container
      resourceRange:
        limits:
          min: "200m"
          max: "2"
  durationPolicy:
    apiCondition:
      url: "http://measure-yolo.serverless.svc.cluster.local/status"
      response: "READY"