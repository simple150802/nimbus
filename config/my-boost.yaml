apiVersion: lazyken.io/v1alpha1
kind: Nimbus
metadata:
  name: boost-001
  namespace: serverless
selector:
  matchExpressions:
  - key: serving.knative.dev/service
    operator: In
    values: ["measure-yolo"]
spec:
  # measurement is optional; omit to accept the defaults (1 cold sample,
  # 10 warm samples). Cold samples are expensive because each forces a
  # scale-to-zero before a fresh cold start.
  measurement:
    coldSamples: 3
    warmSamples: 3
  resourcePolicy:
    containerPolicies:
    - containerName: user-container
      resourceRange:
        limits:
          min: "300m"
          max: "1"
  durationPolicy:
    apiCondition:
      url: "http://measure-yolo.serverless.svc.cluster.local/status"
      response: "READY"