apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: insignface-002
  namespace: serverless
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/window: 10s
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
    spec:
      containerConcurrency: 1
      containers:
        - image: docker.io/meowbyanh/face-track:v8
          ports:
            - containerPort: 8000
          env:
            - name: PROBE_IMAGE
              value: ./probe/face.jpg
          resources:
            requests:
              cpu: "200m"
            limits:
              cpu: "200m"
