apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: measure-llm-001
  namespace: serverless
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/window: 10s
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
    spec:
      containerConcurrency: 1
      containers:
        - image: docker.io/lazyken/measure_llm:v1
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
            limits:
              cpu: "500m"

