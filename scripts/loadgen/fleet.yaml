apiVersion: lazyken.io/v1alpha1
kind: Nimbus
metadata:
  name: loadtest-boost
  namespace: serverless
selector:
  matchExpressions:
  - key: serving.knative.dev/service
    operator: In
    values: ["loadtest-yolo-001", "loadtest-yolo-002", "loadtest-yolo-003", "loadtest-yolo-004", "loadtest-yolo-005", "loadtest-yolo-006", "loadtest-yolo-007", "loadtest-yolo-008", "loadtest-yolo-009", "loadtest-yolo-010"]
spec:
  placement:
    nodeSelector:
      nimbus.io/pool: serverless
  metric: p95
  acceptableResponseTime:
    cold: 16000
    warm: 5000
  preMeasured:
    loadFromDir: "./results/yolo"
  online:
    enabled: true          # ON — so /decide runs the waterfall for the fleet
  measurement:
    coldSamples: 20
    warmSamples: 20
  resourcePolicy:
    containerPolicies:
    - containerName: user-container
      cpuBudget: "1200m"
  durationPolicy:
    coldApiCondition:
      path: "/status"
      response: "READY"
    warmApiCondition:
      path: "/detect/local"
      statusCode: 200
      bodyContains: "\"success\":true"
